name: Oceans Payroll CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  APP_NAME: oceans-payroll

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Build Docker Image
        run: docker build -t $APP_NAME .

  deploy-dev:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Deployment Plan
  run: |
    echo "=================================="
    echo "Oceans Payroll Deployment Plan"
    echo "=================================="
    echo "Step 1: Connect to EC2 using SSH"
    echo "Step 2: Pull latest application code"
    echo "Step 3: Build Docker image"
    echo "Step 4: Stop existing container"
    echo "Step 5: Start new Docker container"
    echo "Step 6: Verify application health"
    echo "Deployment completed successfully"."

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: Production Deployment
        run: echo "Production deployment completed."